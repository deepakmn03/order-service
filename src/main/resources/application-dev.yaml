spring:
  application:
    name: order-process
  datasource:
    url: jdbc:postgresql://localhost:5432/order-service
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  web:
    error:
      include-message: always
      include-stacktrace: on_param  # Show trace only when ?trace=true parameter is sent

server:
  port: 2330
