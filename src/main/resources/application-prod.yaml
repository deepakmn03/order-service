spring:
  application:
    name: order-process
  datasource:
    url: jdbc:postgresql://prod-db-host:5432/order-service
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  web:
    error:
      include-message: always
      include-stacktrace: never  # NEVER show stack trace in production

server:
  port: 2330
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    "[com.order.service]": INFO
